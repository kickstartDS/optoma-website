# Name of your application. Used to uniquely configure containers.
service: ruhmesmeile-design-tokens-editor

# Name of the container image.
image: <%= ENV["DOCKER_DESIGN_TOKENS_EDITOR_IMAGE_NAME"] %>

# Deploy to the same server as the main site.
servers:
  web:
    - <%= ENV["HOSTING_SERVER_IP"] %>

# Enable SSL auto certification via Let's Encrypt.
proxy:
  ssl: true
  hosts:
    - <%= ENV["DESIGN_TOKENS_EDITOR_PUBLIC_DOMAIN"] %>
  app_port: 8080
  response_timeout: 60
  healthcheck:
    path: /api/health

# Credentials for your image host.
registry:
  username: <%= ENV["DOCKER_USERNAME"] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

# Configure builder setup.
builder:
  arch: amd64
  # Build context is the repo root so workspace packages are available
  context: .
  dockerfile: packages/design-tokens-editor/Dockerfile
  args:
    CACHEBUST: <%= Time.now.to_i %>

# Inject ENV variables into containers.
env:
  clear:
    NODE_ENV: production
    PORT: 8080
  secret:
    - MCP_JWT_SECRET
    - STORYBLOK_OAUTH_TOKEN
    - STORYBLOK_SPACE_ID
